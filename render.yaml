services:
  - type: web
    name: soundwave-app
    env: node
    plan: starter
    buildCommand: npm run install-all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
    domains:
      - soundwave-app.onrender.com
    autoDeploy: true
